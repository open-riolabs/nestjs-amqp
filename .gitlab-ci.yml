image: node:22.8

stages:
  - versioning
  - dependencies
  - build
  # - test
  - deploy

versioning:
  stage: versioning
  image: mcr.microsoft.com/dotnet/sdk:6.0
  script:
    - |
      dotnet tool install --global GitVersion.Tool --version 5.*
      export PATH="\$PATH:/root/.dotnet/tools"
      dotnet-gitversion /config ./GitVersion.yml /nocache /verbosity Diagnostic /output buildserver
  artifacts:
    reports:
      dotenv: gitversion.properties
  tags:
    - riolabs
  only:
    - master

dependencies:
  stage: dependencies
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
    policy: pull-push
  script:
    - npm config set "@rlb:registry=https://gitlab.com/api/v4/groups/11765017/-/packages/npm/"
    - npm config set '//gitlab.com/api/v4/groups/11765017/-/packages/npm/:_authToken' '${CI_TOKEN}'
    - npm install
  tags:
    - riolabs
  only:
    - master

build:
  stage: build
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules
    policy: pull
  script:
    - npm link husky
    - npm link @nestjs/cli
    - npm run build
  artifacts:
    paths:
      - $CI_PROJECT_DIR/dist
      - $CI_PROJECT_DIR/node_modules
  tags:
    - riolabs
  only:
    - master

